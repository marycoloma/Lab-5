<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Mary's Online Store</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <header>
      <div class="branding">
        <img src="images/logo.png" alt="Fictional Store logo" class="logo" />
        <h1>Fictional Store</h1>
      </div>

      <nav aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section aria-labelledby="contact-heading">
        <h2 id="contact-heading">Contact Us</h2>

        <form action="#" method="post">
          <div>
            <label for="name">Your Name:</label>
            <input id="name" name="name" type="text" required />
          </div>
          <div>
            <label for="email">Email Address:</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button type="submit">Submit</button>
        </form>
      </section>
    </main>
    <footer>
      <p>Created by Mary Ann Coloma</p>
      <nav aria-label="Social media links">
        <a href="#" aria-label="Facebook page">Facebook</a> |
        <a href="#" aria-label="Twitter page">Twitter</a> |
        <a href="#" aria-label="Instagram page">Instagram</a>
      </nav>
    </footer>
  </body>
</html>
