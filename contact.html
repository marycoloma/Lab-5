<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact page</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>

  <body>
    <header class="page-header">
      <div class="header-middle">
        <img src="images/mlogo.png" alt="site logo" class="logo-oval" />
        <h1>Mary Ann's Page</h1>
      </div>
      <nav class="side-nav">
        <a href="index.html" class="nav-item">Home</a>
        <a href="contact.html" class="nav-item active">Contact us</a>
      </nav>
    </header>
    <main class="left-content">
      <form>
        <label for="name">Your name:</label>
        <input type="text" id="name" name="name" />
        <label for="email">Your email:</label>
        <input type="email" id="email" name="email" />
        <label for="message">Your message:</label>
        <textarea id="message" name="message" rows="5"></textarea>

        <button type="submit">Submit</button>
      </form>
    </main>

    <footer>
      <p>Created by Mary Ann Coloma.</p>
      <p>Follow us on <a href="#">[social media]</a>.</p>
    </footer>
  </body>
</html>
